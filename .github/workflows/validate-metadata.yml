name: Validate Platform.CCC Metadata

on:
  push:
    paths:
      - '**/*.json'
      - 'scripts/validate_metadata.py'
      - '.github/workflows/validate-metadata.yml'
  pull_request:
    paths:
      - '**/*.json'
      - 'scripts/validate_metadata.py'
      - '.github/workflows/validate-metadata.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate example records
        run: |
          python scripts/validate_metadata.py examples/ccc/collective.json
          python scripts/validate_metadata.py examples/daycc/collective.json
          python scripts/validate_metadata.py examples/dawc/collective.json
          python scripts/validate_metadata.py examples/assets/multi_contributor_asset.json
          python scripts/validate_metadata.py examples/projects/multi_contributor_project.json
          python scripts/validate_metadata.py examples/mint_packs/MINT-TEMPLATE-001.json
