<div class="cyc-card">
  <h2>Collective Dashboard</h2>
  <p class="cyc-muted">Read-only scaffold widget. Connect to dashboard_export.json.</p>
  <div id="cyc-collective-dashboard"></div>
</div>
<script>
async function loadCollectiveDashboard(url = "/dashboard_export.json") {
  const target = document.getElementById("cyc-collective-dashboard");
  try {
    const res = await fetch(url);
    const data = await res.json();
    target.innerHTML = `<pre>${JSON.stringify(data.collectives || [], null, 2)}</pre>`;
  } catch (err) {
    target.textContent = "Collective data unavailable.";
  }
}
loadCollectiveDashboard();
</script>
